spring.application.name=product-service
# Config Server Baglantisi
# Docker ortaminda CONFIG_URI degiskeni gecilirse onu alir, yoksa localhost kullanir
spring.config.import=optional:configserver:${CONFIG_URI:http://localhost:8762}

# Profil fallback (docker/local otomatik secilebilir)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Eureka Client (Docker veya local uzerinden override edilebilir)
eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true


# Management / Actuator
management.endpoints.web.exposure.include=*
management.endpoints.web.base-path=/actuator

# Diger
spring.main.allow-bean-definition-overriding=true
spring.cloud.compatibility-verifier.enabled=false