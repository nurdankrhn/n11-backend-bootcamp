spring.application.name=shopping-cart-service


# Config Server Baï¿½lantï¿½sï¿½
# Docker ortamï¿½nda CONFIG_URI deï¿½iï¿½keni geï¿½ilirse onu alï¿½r, yoksa localhost kullanï¿½r
spring.config.import=optional:configserver:${CONFIG_URI:http://localhost:8762}

# Profil fallback (docker/local otomatik seï¿½ilebilir)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Eureka Client (Docker veya local ï¿½zerinden override edilebilir)
eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true


# Management / Actuator
management.endpoints.web.exposure.include=*
management.endpoints.web.base-path=/actuator

# Diï¿½er
spring.main.allow-bean-definition-overriding=true
spring.cloud.compatibility-verifier.enabled=false


